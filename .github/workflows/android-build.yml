name: Android Build

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install npm dependencies
        run: npm install

      - name: Verify Capacitor packages
        run: |
          echo "Checking Capacitor packages..."
          npm list @capacitor/core @capacitor/android @capacitor/cli
          echo "✅ Capacitor packages verified"

      - name: Sync Capacitor to Android
        run: |
          echo "Running Capacitor sync..."
          npx cap sync android
          echo "✅ Capacitor sync completed"

      - name: List Android native project
        working-directory: android
        run: |
          echo "Android project structure:"
          ls -la
          echo ""
          echo "Gradle wrapper:"
          ls -la | grep gradle
          
      - name: Build Android Debug APK
        working-directory: android
        run: |
          echo "Starting Gradle build..."
          chmod +x ./gradlew
          ./gradlew clean
          ./gradlew assembleDebug
          echo "✅ APK build completed"

      - name: Extract Keystore SHA1 and SHA256
        run: |
          KEYSTORE_PATH="${HOME}/.android/debug.keystore"
          
          echo "========================================="
          echo "  Firebase Keystore Fingerprints"
          echo "========================================="
          echo ""
          
          if [ -f "$KEYSTORE_PATH" ]; then
            echo "✅ Debug Keystore Found at: $KEYSTORE_PATH"
            echo ""
            echo "--- SHA1 Fingerprint ---"
            keytool -list -v -keystore "$KEYSTORE_PATH" \
              -alias androiddebugkey \
              -storepass android \
              -keypass android \
              2>/dev/null | grep "SHA1:" || echo "⚠️  Could not extract SHA1"
            
            echo ""
            echo "--- SHA256 Fingerprint ---"
            keytool -list -v -keystore "$KEYSTORE_PATH" \
              -alias androiddebugkey \
              -storepass android \
              -keypass android \
              2>/dev/null | grep "SHA256:" || echo "⚠️  Could not extract SHA256"
            
            echo ""
            echo "--- Full Certificate Details ---"
            keytool -list -v -keystore "$KEYSTORE_PATH" \
              -alias androiddebugkey \
              -storepass android \
              -keypass android 2>/dev/null || echo "⚠️  Could not retrieve full details"
          else
            echo "⚠️  Debug keystore not found at $KEYSTORE_PATH"
            echo "First build - keystore will be created on next build"
          fi
          
          echo ""
          echo "========================================="

      - name: Verify APK file
        run: |
          APK_PATH="android/app/build/outputs/apk/debug/app-debug.apk"
          
          echo "APK Verification:"
          echo "================="
          
          if [ -f "$APK_PATH" ]; then
            echo "✅ APK found at: $APK_PATH"
            echo ""
            echo "File size: $(du -h "$APK_PATH" | cut -f1)"
            echo "SHA1 hash: $(sha1sum "$APK_PATH" | awk '{print $1}')"
            echo "SHA256 hash: $(sha256sum "$APK_PATH" | awk '{print $1}')"
            echo ""
            echo "✅ APK is ready for upload"
          else
            echo "❌ APK not found at expected location"
            echo "Looking for APK files..."
            find android -name "*.apk" -type f 2>/dev/null || echo "No APK files found"
            exit 1
          fi

      - name: Upload APK Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
          if-no-files-found: warn

      - name: Upload Gradle Build Logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-build-logs
          path: |
            android/app/build/outputs/
            android/build/
          retention-days: 7

      - name: Build Summary
        if: always()
        run: |
          echo ""
          echo "========================================="
          echo "  Build Workflow Summary"
          echo "========================================="
          echo ""
          echo "Build Status: ✅ ${{ job.status }}"
          echo "Workflow: ${{ github.workflow }}"
          echo "Branch: ${{ github.ref }}"
          echo "Commit SHA: ${{ github.sha }}"
          echo "Runner: ${{ runner.os }} (ubuntu-latest)"
          echo ""
          echo "APK Output: android/app/build/outputs/apk/debug/app-debug.apk"
          echo ""
          echo "Next Steps:"
          echo "1. Download the APK from Artifacts"
          echo "2. Extract SHA1/SHA256 from build logs above"
          echo "3. Add to Firebase Android app configuration"
          echo "4. Install on Android device for testing"
          echo ""
          echo "========================================="
