name: 🚀 Build Android APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      # ─── 1. Checkout ────────────────────────────────────────────────────────
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4

      # ─── 2. Node.js ─────────────────────────────────────────────────────────
      - name: 🟢 Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ─── 3. Install npm deps ─────────────────────────────────────────────────
      - name: 📦 Install npm dependencies
        run: npm ci

      # ─── 4. Build web app ────────────────────────────────────────────────────
      - name: 🔨 Build web app
        run: npm run build

      # ─── 5. Sync Capacitor → Android ─────────────────────────────────────────
      - name: 🔄 Sync Capacitor to Android
        run: npx cap sync android

      # ─── 6. Java 17 ──────────────────────────────────────────────────────────
      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ─── 7. Cache Gradle ─────────────────────────────────────────────────────
      - name: 📁 Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ─── 8. Fix permissions ──────────────────────────────────────────────────
      - name: 🔑 Make gradlew executable
        run: chmod +x android/gradlew

      # ─── 9. Build APK ────────────────────────────────────────────────────────
      - name: 🏗️ Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4096m -Dorg.gradle.daemon=false"

      # ─── 10. Rename APK ──────────────────────────────────────────────────────
      - name: 📝 Rename APK
        run: |
          mkdir -p artifacts
          cp android/app/build/outputs/apk/debug/app-debug.apk \
             artifacts/AbuAlZahra-v1.0-debug.apk

      # ─── 11. Upload artifact (رابط التحميل) ───────────────────────────────────
      - name: 📤 Upload APK (رابط التحميل)
        uses: actions/upload-artifact@v4
        with:
          name: AbuAlZahra-APK
          path: artifacts/AbuAlZahra-v1.0-debug.apk
          retention-days: 30
          if-no-files-found: error

      # ─── 12. Summary ─────────────────────────────────────────────────────────
      - name: ✅ Build Summary
        run: |
          APK_SIZE=$(du -sh artifacts/AbuAlZahra-v1.0-debug.apk | cut -f1)
          echo "## ✅ بناء ناجح" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| المعلومة | القيمة |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| 📱 اسم التطبيق | أبو الزهراء |" >> $GITHUB_STEP_SUMMARY
          echo "| 📦 حجم الملف | $APK_SIZE |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔢 الإصدار | v1.0 |" >> $GITHUB_STEP_SUMMARY
          echo "| ⏱️ وقت البناء | $(date +'%Y-%m-%d %H:%M:%S') |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📥 رابط التحميل" >> $GITHUB_STEP_SUMMARY
          echo "انتقل إلى تبويب **Actions** ← اختر هذا الـ workflow ← ثم في أسفل الصفحة ستجد قسم **Artifacts** ← اضغط على **AbuAlZahra-APK** لتحميله." >> $GITHUB_STEP_SUMMARY
